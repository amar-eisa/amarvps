name: Deploy to VPS

on:
  push:
    branches:
      - main # أو اسم الفرع الذي تستخدمه

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # التوجه لمسار المشروع في السيرفر (تأكد من تعديل المسار إذا وضعته في مكان آخر)
            cd ~/amarvps
            
            # سحب أحدث التعديلات من GitHub
            git pull origin main
            
            # إعادة بناء الحاوية وتشغيلها في الخلفية
            sudo docker compose up -d --build
            
            # تنظيف صور Docker القديمة غير المستخدمة لتوفير المساحة (اختياري)
            sudo docker image prune -f